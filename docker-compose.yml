services:
  http-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    image: docker_image_http
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; assert requests.get('http://localhost:8000/health').status_code == 200" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my_network

  triton:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: triton
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    shm_size: "256mb"
    volumes:
      - ./triton/models:/triton/models
    command: >
      tritonserver
      --model-repository=/triton/models
      --log-verbose=1
