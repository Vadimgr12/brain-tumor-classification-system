stages:
  download:
    desc: Download brain MRI dataset from Kaggle
    cmd: bash scripts/download_data.sh
    deps:
      - scripts/download_data.sh
    outs:
      - data/raw

  split:
    desc: split raw dataset into train/val/test
    cmd: python brain_tumor_classification/data/split.py --input data/raw/ --output data/splits/
    deps:
      - brain_tumor_classification/data/split.py
      - data/raw/
    outs:
      - data/splits/

  train_statistics:
    desc: compute mean/std statistics on train split
    cmd: python brain_tumor_classification/data/compute_stats.py --input data/splits/train --output data/stats/mean_std.json
    deps:
      - brain_tumor_classification/data/compute_stats.py
      - data/splits/train
    outs:
      - data/stats/

  train:
    desc: Train brain tumor classifier
    cmd: python train.py
    deps:
      - brain_tumor_classification/model.py
      - brain_tumor_classification/data/
      - conf/
      - data/
    outs:
      - checkpoints/

  export_onnx:
    desc: Export best model to ONNX
    cmd: python scripts/export_onnx.py
    deps:
      - scripts/export_onnx.py
      - checkpoints/
    outs:
      - artifacts/model.onnx

  export_tensorrt:
    desc: Convert ONNX model to TensorRT
    cmd: bash scripts/export_tensorrt.sh artifacts/model.onnx
    deps:
      - artifacts/model.onnx
      - scripts/export_tensorrt.sh
    outs:
      - artifacts/model.trt
